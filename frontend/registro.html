<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHelp - Registro</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Criar Conta</h1>

    <form id="registroForm">

        <input
                type="text"
                id="nome"
                placeholder="Nome"
                required
        >

        <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
        >

        <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
        >

        <select id="tipo">

            <option value="calouro">
                Calouro
            </option>

            <option value="veterano">
                Veterano
            </option>

        </select>

        <button type="submit">
            Criar Conta
        </button>

    </form>

    <p>
        Já possui conta?
        <a href="login.html">
            Entrar
        </a>
    </p>

</div>

<script src="js/registro.js"></script>

</body>
</html>
