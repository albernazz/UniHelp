<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHelp - Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>UniHelp</h1>

    <form id="loginForm">

        <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
        >

        <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <p>
        Não possui conta?
        <a href="registro.html">
            Registrar
        </a>
    </p>

</div>

<script src="js/login.js"></script>

</body>
</html>
