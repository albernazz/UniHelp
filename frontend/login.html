<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHelp — Entrar</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="toast" id="uh-toast"></div>

    <!-- HEADER simplificado -->
    <header class="so-header" id="soHeader"></header>

    <div class="so-body" style="justify-content:center;padding-top:48px">
        <div style="display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%">

            <!-- SIDEBAR INFO (aparece em telas largas) -->
            <div style="max-width:220px;padding-top:8px" class="so-sidebar-left" style="position:static;height:auto">
                <h2 style="font-size:27px;font-weight:400;line-height:1.3;color:#232629;margin-bottom:20px">
                    Uni<span style="color:#f48024">Help</span>
                </h2>
                <p style="font-size:15px;color:#525960;margin-bottom:14px;line-height:1.5">
                    Tire suas dúvidas acadêmicas com outros estudantes.
                </p>
                <ul style="list-style:none;font-size:15px;color:#525960;display:flex;flex-direction:column;gap:12px">
                    <li>📝 Faça perguntas sobre suas matérias</li>
                    <li>💬 Responda e ajude colegas</li>
                    <li>👍 Vote nas melhores respostas</li>
                    <li>🏷️ Organize por categorias</li>
                </ul>
            </div>

            <!-- CARD DE LOGIN -->
            <div style="width:100%;max-width:340px">
                <div class="auth-card">
                    <h2>Entrar</h2>

                    <div class="form-group">
                        <label class="form-label" for="loginEmail">E-mail</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com"
                            autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="loginSenha">Senha</label>
                        <input type="password" id="loginSenha" class="form-input" placeholder="••••••••"
                            autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
                    </div>

                    <button class="btn-primary" style="width:100%" onclick="fazerLogin()" id="btnLogin">
                        Entrar
                    </button>

                    <div class="auth-link-row">
                        Não tem conta?
                        <a href="registro.html">Registre-se</a>
                    </div>
                </div>

                <div style="text-align:center;margin-top:16px;font-size:12px;color:#6a737c">
                    Ao entrar, você concorda com os
                    <a href="#" style="color:#0074cc">Termos de Uso</a> da plataforma.
                </div>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            // Se já está logado, redireciona
            if (getUsuario()) window.location.href = 'feed.html';
        });

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;

            if (!email || !senha) {
                showToast('Preencha e-mail e senha.', 'error');
                return;
            }

            const btn = document.getElementById('btnLogin');
            btn.textContent = 'Entrando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.erro || 'E-mail ou senha incorretos.', 'error');
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                    return;
                }

                setAuth(data.usuario, data.token);
                showToast(`Bem-vindo, ${data.usuario.nome}!`, 'success');
                setTimeout(() => window.location.href = 'feed.html', 800);

            } catch (e) {
                showToast('Servidor offline. Tente novamente.', 'error');
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
